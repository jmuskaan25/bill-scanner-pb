<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Pronto Travel</title>
  <link rel="stylesheet" href="styles.css?v=5">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚕</text></svg>">
</head>
<body>
  <!-- Sign-In Wall -->
  <div id="signInWall" class="signin-wall" style="display:flex; position:fixed; inset:0; z-index:9999; background:#f9fafb; align-items:center; justify-content:center;">
    <div class="signin-card">
      <span class="signin-logo">🚕</span>
      <h1>Pronto Travel</h1>
      <p class="subtitle">Admin access required</p>
      <button class="google-btn" id="wallSignInBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="Google">
        Continue with Google
      </button>
      <div style="margin-top: 20px;">
        <button type="button" id="adminToggleBtn" class="admin-toggle-btn">Sign in as Admin</button>
        <div id="adminPasswordField" style="display:none; margin-top: 12px;">
          <input type="password" id="adminPasswordInput" placeholder="Enter admin password" class="admin-password-input">
        </div>
      </div>
    </div>
  </div>

  <header class="header">
    <div class="header-content">
      <a href="index.html" class="btn-back">&larr; Back</a>
      <span class="header-logo">🚕</span>
      <div>
        <div class="header-title">Admin Panel</div>
        <div class="header-subtitle">Manage all reimbursements</div>
      </div>
      <div class="header-actions">
        <a href="https://docs.google.com/spreadsheets/d/1dMsOc77yzB1OtTDmrr74Ba3-RaaipJYqFd663FRwImE/edit" target="_blank" class="btn-submissions" style="background:#10b981;">📊 Google Sheet</a>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <div class="card-header">
        <span class="icon">🔧</span>
        <h2>All Reimbursements</h2>
      </div>
      <div class="card-body" style="padding: 0;">
        <div class="submissions-table-wrapper">
          <table class="submissions-table" id="manageTable">
            <thead>
              <tr>
                <th>Date</th>
                <th>Submitted By</th>
                <th>Provider</th>
                <th>From</th>
                <th>To</th>
                <th>Amount</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="manageBody">
              <tr><td colspan="7"><div class="empty-state"><span class="empty-icon">📭</span><p>Loading...</p></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.25.2/dist/pocketbase.umd.js"></script>
  <script src="manage.js"></script>
</body>
</html>
